client_id = "aeefa5eb5df60d6ed0b4b0727a08b3b2"
name = "x-seeding"
application_url = "https://x-seeding-backend.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "draft_orders/update", "fulfillments/create", "fulfillments/update" ]
  uri = "/webhooks"

[access_scopes]
scopes = "read_inventory,read_products,write_draft_orders,read_draft_orders,read_fulfillments"

[auth]
redirect_urls = [ "https://x-seeding-backend.vercel.app/auth/callback" ]
