client_id = "fd3bb73cfc21e2a47db99799ddb620ba"
name = "Zeedy"
application_url = "https://www.zeedy.xyz"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "draft_orders/update", "fulfillments/create", "fulfillments/update" ]
  uri = "/webhooks"

[webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/gdpr/customers-data-request"
  customer_deletion_url = "/webhooks/gdpr/customers-redact"
  shop_deletion_url = "/webhooks/gdpr/shop-redact"

[access_scopes]
scopes = "read_inventory,read_products,write_draft_orders,read_draft_orders,read_fulfillments,read_locations"

[auth]
redirect_urls = [ "https://www.zeedy.xyz/auth/callback" ]
